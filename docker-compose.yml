services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - PYTHON_SERVICE_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - zetca-network

  backend:
    build:
      context: ./python
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./python/.env
    environment:
      - FRONTEND_URL=http://localhost:3000
    networks:
      - zetca-network

networks:
  zetca-network:
    driver: bridge
